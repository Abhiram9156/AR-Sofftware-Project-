{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; margin-bottom: 2rem;">
    <h1 class="page-title">Manage Staff</h1>
    <p class="section-subtitle">Add new technicians to the database so they appear in dropdowns.</p>
    
    <form method="POST" action="{{ url_for('manage_staff') }}">
        <div class="form-group">
            <label for="name">New Technician Name</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="e.g. John Doe" required autofocus>
        </div>
        
        <div style="margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">+ Save Technician</button>
        </div>
    </form>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-top: 0;">Current Technicians</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th style="text-align: right;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for tech in technicians %}
                <tr>
                    <td style="color: var(--text-muted);">{{ tech.id }}</td>
                    <td style="font-weight: 500;">{{ tech.name }}</td>
                    <td style="text-align: right;">
                        <form method="POST" action="{{ url_for('delete_staff', id=tech.id) }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this technician?');">
                            <button type="submit" class="btn btn-sm" style="background: rgba(239, 68, 68, 0.2); color: #EF4444; border: 1px solid #EF4444;">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
